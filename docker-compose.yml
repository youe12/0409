services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - COZE_PROJECT_ENV=PROD
      - DEPLOY_RUN_PORT=5000
      - COZE_API_KEY=${COZE_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/questions"]
      interval: 30s
      timeout: 10s
      retries: 3
