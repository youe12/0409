<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&amp;family=Public+Sans:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#b1eeed",
                    "surface-dim": "#d7dadb",
                    "surface": "#f7fafb",
                    "on-primary-fixed": "#001e2f",
                    "on-primary-container": "#85bae3",
                    "primary-container": "#004b6e",
                    "surface-container": "#ebeeef",
                    "surface-bright": "#f7fafb",
                    "error-container": "#ffdad6",
                    "secondary-container": "#b1eeed",
                    "outline-variant": "#c1c7cf",
                    "primary-fixed": "#c9e6ff",
                    "on-tertiary-container": "#9ebc9c",
                    "surface-container-highest": "#e0e3e4",
                    "inverse-on-surface": "#eef1f2",
                    "outline": "#71787f",
                    "primary": "#00334d",
                    "on-secondary-container": "#316d6d",
                    "on-tertiary-fixed": "#07200b",
                    "secondary-fixed-dim": "#95d1d1",
                    "on-secondary-fixed": "#002020",
                    "on-primary": "#ffffff",
                    "surface-tint": "#296388",
                    "on-error": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#e5e9ea",
                    "background": "#f7fafb",
                    "inverse-surface": "#2d3132",
                    "tertiary-container": "#324c33",
                    "on-error-container": "#93000a",
                    "on-surface-variant": "#41484e",
                    "on-secondary": "#ffffff",
                    "on-surface": "#181c1d",
                    "primary-fixed-dim": "#97cdf6",
                    "on-secondary-fixed-variant": "#074f4f",
                    "secondary": "#2a6767",
                    "tertiary-fixed-dim": "#b0ceae",
                    "on-primary-fixed-variant": "#014b6e",
                    "on-tertiary-fixed-variant": "#334d34",
                    "surface-container-low": "#f1f4f5",
                    "surface-container-lowest": "#ffffff",
                    "on-background": "#181c1d",
                    "inverse-primary": "#97cdf6",
                    "tertiary-fixed": "#ccebc8",
                    "error": "#ba1a1a",
                    "surface-variant": "#e0e3e4",
                    "tertiary": "#1c351e"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope", "sans-serif"],
                    "body": ["Public Sans", "sans-serif"],
                    "label": ["Public Sans", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #00334d 0%, #004b6e 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased">
<!-- TopNavBar Component -->
<header class="bg-slate-50 dark:bg-slate-900 text-sky-900 dark:text-sky-100 font-['Manrope'] font-bold text-lg flex justify-between items-center w-full px-8 py-4 max-w-screen-2xl mx-auto transition-all duration-300 ease-in-out">
<div class="flex items-center gap-4">
<span class="text-xl font-bold tracking-tight text-sky-900 dark:text-sky-200">学术策展人</span>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-slate-500 dark:text-slate-400 hover:text-sky-700 transition-colors" href="#">仪表板</a>
<a class="text-sky-900 dark:text-sky-200 border-b-2 border-sky-900 dark:border-sky-200 pb-1" href="#">测评</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-sky-700 transition-colors" href="#">历史</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-sky-700 transition-colors" href="#">报告</a>
</nav>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="p-2 rounded-full hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-colors">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<div class="h-10 w-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="儿童个人资料头像" class="h-full w-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuApgnkezIpbxK-JZYIrObNJa_PhltYe21LbyYz3c57tQ7lYqoS4nufge1XE6cGdbzq71IGGFMrptqJW4dLOmj70JCVKmddFJc96_thOKlw5AAmG63a-t_k_o7ieGHDtUHsu-n6h-YRq9IH9KmDVNNClGPHtcDuR4LYupOC4pRXp1oszJT56HuBQeicogcriDqzYBaVeMDCRkB9OfMcA7pETy71SL2awmp81PbiMj3pl5cABMmV9aeGTqMKnoVKmlpzdwcTGWxfifOs"/>
</div>
</div>
</header>
<main class="max-w-5xl mx-auto px-6 py-12">
<!-- Progress Section -->
<div class="mb-12">
<div class="flex justify-between items-end mb-4">
<div>
<span class="font-label text-xs font-medium uppercase tracking-widest text-on-surface-variant">空间推理</span>
<h1 class="font-headline text-2xl font-bold text-primary mt-1">第 12 题，共 40 题</h1>
</div>
<span class="font-label text-sm font-medium text-secondary">已完成 30%</span>
</div>
<!-- Custom Progress Bar -->
<div class="h-1.5 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-secondary-fixed-dim" style="width: 30%"></div>
</div>
</div>
<!-- Question Canvas -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
<!-- Left Side: Question and Visuals -->
<div class="lg:col-span-7 space-y-8">
<div class="bg-surface-container-low rounded-xl p-8 transition-all">
<h2 class="font-headline text-2xl font-medium text-on-surface leading-snug mb-8">
                        请找出下列方块中的规律。哪个图形能逻辑地完成右侧的序列？
                    </h2>
<!-- Question Graphic Asset with Friendly Cartoon Style -->
<div class="aspect-video w-full bg-white rounded-2xl p-6 flex items-center justify-center relative border-4 border-dashed border-secondary-container/50">
<div class="grid grid-cols-4 gap-4 w-full h-full p-4 relative">
<!-- Pattern Representation -->
<div class="flex items-center justify-center bg-sky-50 rounded-2xl shadow-sm">
<span class="material-symbols-outlined text-5xl text-primary" data-icon="square">square</span>
</div>
<div class="flex items-center justify-center bg-sky-50 rounded-2xl shadow-sm">
<span class="material-symbols-outlined text-5xl text-primary" data-icon="circle" style="font-variation-settings: 'FILL' 1;">circle</span>
</div>
<div class="flex items-center justify-center bg-sky-50 rounded-2xl shadow-sm">
<span class="material-symbols-outlined text-5xl text-primary" data-icon="square">square</span>
</div>
<div class="flex items-center justify-center bg-surface-container-lowest rounded-2xl border-4 border-dotted border-outline-variant flex-col gap-1">
<span class="material-symbols-outlined text-4xl text-outline-variant" data-icon="help">help</span>
</div>
<!-- Cartoon Decorative Element -->
<div class="absolute -bottom-2 -left-2">
<span class="material-symbols-outlined text-5xl text-secondary-container opacity-40 select-none" data-icon="auto_awesome">auto_awesome</span>
</div>
</div>
</div>
</div>
<!-- Parent Tip Section (Cartoon Friendly Style) -->
<div class="bg-secondary-container/20 rounded-2xl p-6 border-2 border-secondary-container/40 relative overflow-hidden">
<div class="flex gap-5 items-start relative z-10">
<div class="bg-secondary-fixed text-on-secondary-fixed p-3 rounded-full shadow-md flex items-center justify-center">
<span class="material-symbols-outlined text-3xl" data-icon="face">face</span>
</div>
<div>
<h3 class="font-headline text-lg font-bold text-primary mb-2">如何引导您的孩子完成此题</h3>
<p class="text-on-surface-variant text-md leading-relaxed">
                                鼓励您的孩子指着每一个方块，并大声说出形状的名字。尽量不要直接给出答案；相反，可以问：“从第一个方块到第二个方块发生了什么变化？”这有助于培养孩子的归纳推理能力。
                            </p>
</div>
</div>
<!-- Fun Background Shape -->
<div class="absolute -right-8 -bottom-8 w-32 h-32 bg-secondary-container/30 rounded-full blur-2xl"></div>
</div>
</div>
<!-- Right Side: Answer Options -->
<div class="lg:col-span-5 space-y-4">
<span class="font-label text-xs font-medium uppercase tracking-widest text-on-surface-variant px-1">请选择您的答案</span>
<!-- Option A -->
<button class="w-full text-left group bg-surface-container-lowest hover:bg-surface-bright p-5 rounded-xl transition-all border border-transparent hover:border-outline-variant/20 flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="w-8 h-8 rounded-lg bg-surface-container-low flex items-center justify-center font-bold text-primary group-hover:bg-primary-fixed">A</span>
<div class="flex items-center justify-center p-2 bg-surface-container-low rounded-lg">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="circle" style="font-variation-settings: 'FILL' 1;">circle</span>
</div>
<span class="font-medium text-on-surface">实心圆</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<!-- Option B (Selected) -->
<button class="w-full text-left group bg-surface-container-lowest p-5 rounded-xl transition-all border-2 border-secondary flex items-center justify-between ring-4 ring-secondary-container/30">
<div class="flex items-center gap-4">
<span class="w-8 h-8 rounded-lg bg-secondary-container flex items-center justify-center font-bold text-secondary">B</span>
<div class="flex items-center justify-center p-2 bg-secondary-container/50 rounded-lg">
<span class="material-symbols-outlined text-2xl text-secondary" data-icon="circle">circle</span>
</div>
<span class="font-bold text-on-surface">空心圆</span>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option C -->
<button class="w-full text-left group bg-surface-container-lowest hover:bg-surface-bright p-5 rounded-xl transition-all border border-transparent hover:border-outline-variant/20 flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="w-8 h-8 rounded-lg bg-surface-container-low flex items-center justify-center font-bold text-primary group-hover:bg-primary-fixed">C</span>
<div class="flex items-center justify-center p-2 bg-surface-container-low rounded-lg">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="change_history">change_history</span>
</div>
<span class="font-medium text-on-surface">三角形</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<!-- Option D -->
<button class="w-full text-left group bg-surface-container-lowest hover:bg-surface-bright p-5 rounded-xl transition-all border border-transparent hover:border-outline-variant/20 flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="w-8 h-8 rounded-lg bg-surface-container-low flex items-center justify-center font-bold text-primary group-hover:bg-primary-fixed">D</span>
<div class="flex items-center justify-center p-2 bg-surface-container-low rounded-lg">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="pentagon">pentagon</span>
</div>
<span class="font-medium text-on-surface">五边形</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<!-- Navigation Buttons -->
<div class="pt-8 flex gap-4">
<button class="flex-1 py-4 px-6 rounded-xl border border-outline-variant/40 font-headline font-bold text-primary hover:bg-surface-container-high transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
                        上一题
                    </button>
<button class="flex-[2] py-4 px-6 rounded-xl bg-primary-gradient font-headline font-bold text-on-primary shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2">
                        确认并继续
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer Component -->
<footer class="w-full py-8 px-12 flex flex-col md:flex-row justify-between items-center gap-4 text-center md:text-left bg-slate-100 dark:bg-slate-950 text-slate-600 dark:text-slate-400 font-['Public_Sans'] text-[10px] tracking-wide uppercase font-medium mt-12 transition-all">
<p>© 2024 教育临床卓越。所有引用均通过韦氏标准验证。</p>
<div class="flex gap-6">
<a class="text-slate-500 hover:text-sky-900 transition-colors" href="#">研究方法</a>
<a class="text-slate-500 hover:text-sky-900 transition-colors" href="#">同行评审</a>
<a class="text-slate-500 hover:text-sky-900 transition-colors" href="#">技术支持</a>
<a class="text-slate-500 hover:text-sky-900 transition-colors" href="#">法律条款</a>
</div>
</footer>
</body></html>
